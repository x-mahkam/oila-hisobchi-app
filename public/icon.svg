<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="512" height="512" fill="none">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="75%">
      <stop offset="0%"  stop-color="#4A44C4"/>
      <stop offset="55%" stop-color="#302BA0"/>
      <stop offset="100%" stop-color="#1A1668"/>
    </radialGradient>
    <filter id="halo" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="1.1"/>
    </filter>
  </defs>

  <rect width="120" height="120" rx="30" fill="url(#bg)"/>

  <!-- 1-qatlam: nozik halo -->
  <g filter="url(#halo)" stroke="#D8D6FF" stroke-opacity="0.38"
     stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M18 40 L60 16 L102 40" stroke-width="9.5"/>
    <rect x="18" y="47" width="84" height="57" rx="14" stroke-width="9"/>
    <path d="M60 96 C54 90.5 45 83 45 75.5 C45 70.8 48.7 67.2 53 67.2 C56 67.2 58.6 69 60 70.5 C61.4 69 64 67.2 67 67.2 C71.3 67.2 75 70.8 75 75.5 C75 83 66 90.5 60 96 Z" stroke-width="9"/>
  </g>

  <!-- 2-qatlam: aniq, sof oq chiziq -->
  <g stroke="#FFFFFF" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Tom: hamyondan kichik bo'shliq bilan; uchlari x=18/102 da -->
    <path d="M18 40 L60 16 L102 40" stroke-width="8"/>
    <!-- Hamyon konturi -->
    <rect x="18" y="47" width="84" height="57" rx="14" stroke-width="7.5"/>
    <!-- O'rta chiziq: uchlari devor ichida (butt) -->
    <path d="M18 58 L102 58" stroke-width="7.5" stroke-linecap="butt"/>
    <!-- Yurak: pastroq, o'rta chiziqqa tegmaydi, pastki devorga ham -->
    <path d="M60 96 C54 90.5 45 83 45 75.5 C45 70.8 48.7 67.2 53 67.2 C56 67.2 58.6 69 60 70.5 C61.4 69 64 67.2 67 67.2 C71.3 67.2 75 70.8 75 75.5 C75 83 66 90.5 60 96 Z" stroke-width="7.5"/>
  </g>
</svg>
