<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#6366f1" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Oila Hisobchi</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#090e1c;overflow-x:hidden}
    #root{max-width:480px;margin:0 auto;min-height:100vh}
    input,button,textarea{font-family:inherit}
    ::-webkit-scrollbar{width:0;height:0}

    /* ===== GLOBAL ANIMATSIYALAR ===== */
    @keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
    @keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.25);opacity:.7}}
    @keyframes pulseGlow{0%,100%{transform:scale(1);box-shadow:0 20px 60px var(--glow,rgba(99,102,241,.3))}50%{transform:scale(1.05);box-shadow:0 28px 80px var(--glow,rgba(99,102,241,.45))}}
    @keyframes fadeUp{0%{opacity:0;transform:translateY(16px)}100%{opacity:1;transform:translateY(0)}}
    @keyframes fadeIn{0%{opacity:0}100%{opacity:1}}
    @keyframes slideIn{0%{opacity:0;transform:translateX(-12px)}100%{opacity:1;transform:translateX(0)}}
    @keyframes scaleIn{0%{opacity:0;transform:scale(.92)}100%{opacity:1;transform:scale(1)}}
    @keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
    @keyframes spin{100%{transform:rotate(360deg)}}
    @keyframes bounceIn{0%{opacity:0;transform:scale(.3)}50%{transform:scale(1.08)}100%{opacity:1;transform:scale(1)}}

    /* Yordamchi klasslar */
    .anim-float{animation:floatY 3.5s ease-in-out infinite}
    .anim-pulse{animation:pulseGlow 3s ease-in-out infinite}
    .anim-fadeUp{animation:fadeUp .5s ease both}
    .anim-fadeIn{animation:fadeIn .4s ease both}
    .anim-scaleIn{animation:scaleIn .35s cubic-bezier(.34,1.56,.64,1) both}
    .anim-bounceIn{animation:bounceIn .5s cubic-bezier(.34,1.56,.64,1) both}
    .skeleton{background:linear-gradient(90deg,rgba(148,163,184,.08) 25%,rgba(148,163,184,.18) 50%,rgba(148,163,184,.08) 75%);background-size:800px 100%;animation:shimmer 1.4s infinite linear;border-radius:10px}

    /* Tugma bosilganda silliq */
    button{transition:transform .12s ease,box-shadow .2s ease,background .2s ease,opacity .2s ease}
    button:active{transform:scale(.96)}

    /* Reduced motion - hurmat */
    @media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="./src/main.jsx"></script>
</body>
</html>
