name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm install

      - name: Testlarni ishga tushirish (npm test)
        run: npm test

      - name: Lint (hozircha faqat ogohlantirish — hali qizil qilib to'xtatmaydi)
        run: npm run lint
        continue-on-error: true
