apply plugin: 'com.android.application'

android {
    namespace = "com.mahakam.oilahisobchi"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.mahakam.oilahisobchi"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        // CI'da har build uchun avtomatik oshiriladi (APP_VERSION_CODE env).
        // Lokal buildda env bo'lmasa — pastdagi standart qiymatlar.
        // DIQQAT: aniq `=` bilan — `versionCode (...)` metod chaqiruviga
        // aylanib "Value is null" xatosini berardi.
        versionCode = ((System.getenv("APP_VERSION_CODE") ?: "1") as Integer)
        versionName = (System.getenv("APP_VERSION_NAME") ?: "1.0")
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    // Lint: release build (lintVitalRelease) lint xatolarida yiqilmasin.
    // splash.png faqat orientatsiya/zichlik papkalarida (Capacitor standart
    // tuzilishi) — MissingDefaultResource'ni halokatli deb hisoblab, imzolangan
    // build'ni to'xtatardi. CI'da APK/AAB chiqishi uchun release lint'ni
    // bloklovchi qilmaymiz (ilova ishlashiga ta'sir qilmaydi).
    lint {
        disable 'MissingDefaultResource'
        abortOnError false
        checkReleaseBuilds false
    }
    // Imzolash: CI'da RELEASE_KEYSTORE_FILE env berilsa — release imzo bilan.
    // Env bo'lmasa (lokal build) — Android Studio'dagi odatiy oqim o'zgarmaydi.
    signingConfigs {
        release {
            if (System.getenv("RELEASE_KEYSTORE_FILE")) {
                storeFile file(System.getenv("RELEASE_KEYSTORE_FILE"))
                storePassword System.getenv("RELEASE_KEYSTORE_PASSWORD")
                keyAlias System.getenv("RELEASE_KEY_ALIAS")
                // PKCS12 keystore'da kalit paroli DOIM store paroliga teng
                // (keytool alohida -keypass'ni e'tiborsiz qoldiradi). RELEASE_KEY_PASSWORD
                // berilmasa store parolini ishlatamiz — "Given final block not properly
                // padded" imzolash xatosi butunlay yo'qoladi.
                keyPassword System.getenv("RELEASE_KEY_PASSWORD") ?: System.getenv("RELEASE_KEYSTORE_PASSWORD")
            }
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            if (System.getenv("RELEASE_KEYSTORE_FILE")) {
                signingConfig signingConfigs.release
            }
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
