<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b" />
      <stop offset="50%" stop-color="#312e81" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>
    
    <!-- Gold Coin Gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>

    <!-- Emerald Glow Gradient -->
    <linearGradient id="emGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#059669" />
      <stop offset="100%" stop-color="#34d399" />
    </linearGradient>

    <!-- Soft Drop Shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Rounded Background Card -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" />

  <!-- Main Shield/Home Structure with Shadow -->
  <g filter="url(#shadow)">
    <!-- Stylized House roof and body -->
    <path d="M256 120 L120 230 L160 230 L160 380 C160 391 169 400 180 400 L332 400 C343 400 352 391 352 380 L352 230 L392 230 Z" fill="url(#emGrad)" opacity="0.85" />
    
    <!-- White inner arch for elegance -->
    <path d="M256 150 L150 236 L180 236 L180 370 L332 370 L332 236 L362 236 Z" fill="#ffffff" opacity="0.1" />

    <!-- Big Glowing Golden Coin in the Center representing savings -->
    <circle cx="256" cy="290" r="68" fill="url(#goldGrad)" stroke="#ffffff" stroke-width="4" />
    
    <!-- Inset details on Gold Coin -->
    <circle cx="256" cy="290" r="54" fill="none" stroke="#fbbf24" stroke-width="2" stroke-dasharray="8,6" />
    
    <!-- "Family/Oila" stylised plus/heart/growth icon in the center of the coin -->
    <path d="M256 264 L256 316 M230 290 L282 290" stroke="#ffffff" stroke-width="10" stroke-linecap="round" />
  </g>
</svg>
